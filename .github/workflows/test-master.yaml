name: PR Test POC

on:
  push:
    branches-ignore:
      - '**/poc-**' # do not allow poc branches to run this workflow
  pull_request:
    types: [opened, reopened]
    branches: # pull request target is master
      - master
jobs:
  guard:
    # head_ref is only set for pull_request events
    # do not allow poc branches to run this workflow
    if: !(contains(github.head_ref, '/poc-')) || github.event_name != 'pull_request'
    name: Test Master
    runs-on: ubuntu-latest
    steps:
      - name: Check for Proof of Concept
        shell: bash
        run: |
          echo "github.head_ref = ${{ github.head_ref }}"
          echo "github = ${{ github }}"
          exit 1
