name: PR Test POC test

on:
  push:
    branches-ignore:
      - '**test-**' # do not allow poc branches to run this workflow
  pull_request:
    types: [opened, reopened]
    branches: # pull request target is master
      - master
jobs:
  guard-test:
    if: github.event_name != 'pull_request' || !(contains(github.head_ref, 'test-'))
    name: Test Master
    runs-on: ubuntu-latest
    steps:
      - name: Check for Test
        shell: bash
        run: |
          echo "github.head_ref = ${{ github.head_ref }}"
          echo "github = ${{ github }}"
          exit 1
