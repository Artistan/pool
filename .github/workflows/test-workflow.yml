name: PR Test for TEST

on:
  push:
    branches-ignore:
      - '**test-**'
  pull_request:
    types: [opened, reopened]
    branches: # pull request target is master
      - master
jobs:
  guard:
    if: !(contains(github.head_ref, 'test-'))
    name: Test Master
    runs-on: ubuntu-latest
    steps:
      - name: Check for Proof of TEST branch
        shell: bash
        run: |
          echo "github.head_ref = ${{ github.head_ref }}"
          echo "github = ${{ github }}"
          exit 1
