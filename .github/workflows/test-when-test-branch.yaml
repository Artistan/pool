name: PR Test if IS a TEST Branch

on:
  push:
    branches:
      - '**/test-**' # do not allow poc branches to run this workflow
  pull_request:
    types: [opened, reopened]
    branches: # pull request target is master
      - master
jobs:
  guard-poc:
    if: github.event_name == 'push' || (contains(github.head_ref, '/test-'))
    name: IS TEST
    runs-on: ubuntu-latest
    steps:
      - name: Run this when PR is a TEST branch
        shell: bash
        run: |
          echo "github.head_ref = ${{ github.head_ref }}"
          echo "github = ${{ github }}"
          exit 1
