name: Build and Deploy
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write # Allow GITHUB_TOKEN to commit to the deploy branch.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The deploy action pushes to gh-pages with its own github_access_token.
          # Don't let checkout persist the GITHUB_TOKEN as a git credential, or it
          # conflicts with that push and fails with "git ... exit code 1".
          persist-credentials: false
      - name: Angular Deploy gh-pages Actions
        uses: AhsanAyaz/angular-deploy-gh-pages-actions@v1.4.0
        env:
          # `npm install` needs this to authenticate to the Font Awesome
          # registry (see .npmrc). Add FONTAWESOME_NPM_TOKEN as a repo secret.
          FONTAWESOME_NPM_TOKEN: ${{ secrets.FONTAWESOME_NPM_TOKEN }}
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }} # see the Configuration section for how you can create secrets
          build_configuration: production # The build environment for the app. please look configurations in your angular.json
          base_href: /   # make sure this corresponds to https://<your_username>.github.io/<base_href>/
          deploy_branch: gh-pages # The branch the action should deploy to (Pages serves from gh-pages).
          angular_dist_build_folder: dist/pages-app/browser # The Angular application builder emits the static site into the browser/ subfolder.
