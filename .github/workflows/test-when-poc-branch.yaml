name: PR Test if IS a POC Branch

on:
  push:
    branches:
      - '**/[Pp][Oo][Cc]-**' # do not allow poc branches to run this workflow
  pull_request:
    types: [opened, reopened]
    branches: # pull request target is master
      - master
jobs:
  guard-poc:
    if: github.event_name == 'push' || (contains(github.head_ref, '/[Pp][Oo][Cc]-'))
    name: IS POC
    runs-on: ubuntu-latest
    steps:
      - name: Run this when PR is a POC branch
        shell: bash
        run: |
          echo "github.head_ref = ${{ github.head_ref }}"
          echo "github = ${{ github }}"
          exit 1
